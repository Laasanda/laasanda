<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Laa Sanda Mega Store</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif}
body{background:#f4f4f4;padding-bottom:90px}
header{position:sticky;top:0;background:#fff;padding:15px 20px;display:flex;justify-content:space-between;align-items:center;box-shadow:0 2px 10px rgba(0,0,0,.1);z-index:1000}
.logo{font-size:30px;font-weight:bold;color:#ff6600}
.hero{height:320px;background:url('https://images.unsplash.com/photo-1441986300917-64674bd600d8?q=80&w=1400') center/cover;display:flex;justify-content:center;align-items:center;text-align:center;color:#fff}
.hero-box{background:rgba(0,0,0,.55);padding:30px;border-radius:20px}
.search{padding:15px;background:#fff}
.search input{width:100%;padding:14px;border-radius:12px;border:1px solid #ccc;font-size:16px}
.categories{display:flex;overflow:auto;gap:10px;padding:15px;background:#fff}
.cat{background:#ff6600;color:#fff;padding:12px 18px;border-radius:30px;white-space:nowrap;font-weight:bold}
.section-title{padding:20px;font-size:26px;font-weight:bold}
.products{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:18px;padding:20px}
.card{background:#fff;border-radius:18px;overflow:hidden;box-shadow:0 4px 15px rgba(0,0,0,.1)}
.card img{width:100%;height:200px;object-fit:cover}
.card-content{padding:15px}
.title{font-size:18px;font-weight:bold;margin-bottom:8px}
.price{font-size:22px;color:#ff3300;font-weight:bold;margin-bottom:10px}
.btn{display:block;text-align:center;background:#25D366;color:#fff;text-decoration:none;padding:12px;border-radius:12px;font-weight:bold}
.offer{margin:20px;padding:25px;background:linear-gradient(45deg,#ff6600,#ff3300);color:#fff;border-radius:20px;text-align:center}
footer{position:fixed;bottom:0;width:100%;background:#fff;display:flex;justify-content:space-around;padding:12px 0;box-shadow:0 -2px 10px rgba(0,0,0,.1)}
footer a{text-decoration:none;color:#333;font-size:14px;font-weight:bold;text-align:center}
</style>
</head>
<body>

<header>
<div class="logo">Laa Sanda</div>
<div>🛒</div>
</header>

<section class="hero">
<div class="hero-box">
<h1>Laa Sanda Mega Store</h1>
<p>Premium Online Shopping Experience</p>
</div>
</section>

<div class="search">
<input type="text" id="searchInput" placeholder="Search products..." onkeyup="searchProducts()">
</div>

<div class="categories">
<div class="cat">Fashion</div>
<div class="cat">Beauty</div>
<div class="cat">Electronics</div>
<div class="cat">Kitchen</div>
</div>

<h2 class="section-title">Featured Products</h2>

<section class="products" id="products">

<div class="card">
<img src="https://images.unsplash.com/photo-1542291026-7eec264c27ff?q=80&w=1000">
<div class="card-content">
<div class="title">Fashion Shoes</div>
<div class="price">LKR 4500</div>
<a class="btn" href="https://wa.me/94757688103?text=I%20want%20to%20order%20Fashion%20Shoes" target="_blank">Order on WhatsApp</a>
</div>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1505740420928-5e560c06d30e?q=80&w=1000">
<div class="card-content">
<div class="title">Wireless Headphones</div>
<div class="price">LKR 6800</div>
<a class="btn" href="https://wa.me/94757688103?text=I%20want%20to%20order%20Wireless%20Headphones" target="_blank">Order on WhatsApp</a>
</div>
</div>

</section>

<div class="offer">
<h2>🔥 Mega Offer</h2>
<p>Best deals everyday with premium products</p>
</div>

<footer>
<a href="#">🏠<br>Home</a>
<a href="#products">🛍<br>Products</a>
<a href="https://wa.me/94757688103">💬<br>Chat</a>
</footer>

<script>
function searchProducts(){
let input=document.getElementById('searchInput').value.toLowerCase();
let cards=document.querySelectorAll('.card');

cards.forEach(card=>{
let title=card.querySelector('.title').innerText.toLowerCase();
if(title.includes(input)){
card.style.display='block';
}else{
card.style.display='none';
}
});
}
</script>

</body>
</html>
